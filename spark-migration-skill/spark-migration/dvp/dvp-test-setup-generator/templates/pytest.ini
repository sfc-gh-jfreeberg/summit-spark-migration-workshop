[pytest]
testpaths = source migrated
addopts = --import-mode=importlib
markers =
    source: PySpark source tests (baseline generation)
    migrated: Snowpark migrated tests (validation)
    spark: requires local PySpark/Spark runtime
    snowflake: requires Snowflake connection
    snowpark: Snowpark API tests (code rewrite)
    snowpark_connect: Snowpark Connect tests (PySpark on Snowflake, minimal rewrite)
